# ~/.config/tmux/tmux.conf
# Managed via GNU Stow → ~/personal/dotfiles/tmux/.config/tmux/tmux.conf
#
# Plugin manager : TPM  (bootstrap → see bottom of file)
# Navigator      : christoomey/vim-tmux-navigator  (also install nvim side)
# Status bar     : catppuccin/tmux v2  (mocha palette)
#
# ─── Terminal & colour ────────────────────────────────────────────────────────
# WezTerm can advertise itself as either "xterm-256color" (its default) or
# "wezterm" (set `term = "wezterm"` in your .wezterm.lua to unlock undercurl,
# hyperlinks, and other extended capabilities).
# Both patterns are covered below — whichever $TERM WezTerm presents, tmux
# will pass true-colour and the extended feature set through to nvim.
set -g  default-terminal   "tmux-256color"
set -as terminal-features  ",xterm-256color:RGB:hyperlinks:usstyle"
set -as terminal-features  ",wezterm:RGB:hyperlinks:usstyle"
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",wezterm:Tc"

# ─── Core behaviour ───────────────────────────────────────────────────────────
set -g  escape-time        0       # no Esc delay — critical for nvim
set -g  focus-events       on      # pass FocusIn/Out to editors (gitsigns, etc.)
set -g  mouse              on
set -g  history-limit      50000
set -g  base-index         1       # windows start at 1
setw -g pane-base-index    1
set -g  renumber-windows   on      # collapse gaps after window close
set -g  set-titles         on
set -g  set-titles-string  "#S · #W"

# ─── Status bar position ──────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5

# ─── Splits & windows (keep cwd) ─────────────────────────────────────────────
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ─── Pane resize (repeatable) ────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Copy mode (vi keys) ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ─── Misc bindings ────────────────────────────────────────────────────────────
bind r source-file "$TMUX_CONF" \; display "Config reloaded ✓"
bind x kill-pane                   # skip the confirmation prompt
bind q display-panes               # briefly show pane numbers

# ─── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # sane defaults (overrideable below)

# Seamless pane ↔ nvim window navigation
# Requires nvim plugin: christoomey/vim-tmux-navigator
# See nvim spec: custom/plugins/vim-tmux-navigator.lua
set -g @plugin 'christoomey/vim-tmux-navigator'

# Status bar theme
set -g @plugin 'tmux-plugins/tmux-cpu'

# ─── catppuccin/tmux config ───────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_middle_separator ""

# Window status style: rounded | basic | slanted | custom
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_default_text  " #W"
set -g @catppuccin_window_current_text  " #W"
set -g @catppuccin_window_current_fill  "number"

# Bootstrap catppuccin when missing.
if "test ! -d $HOME/.config/tmux/plugins/catppuccin/tmux" \
  "run 'mkdir -p $HOME/.config/tmux/plugins/catppuccin && git clone -b v2.3.0 https://github.com/catppuccin/tmux.git $HOME/.config/tmux/plugins/catppuccin/tmux'"

# CPU / RAM icon pill accents (upstream defaults both to @thm_yellow).
# Use literal Catppuccin Mocha hex here: #{E:@thm_*} is not defined until catppuccin
# loads, so #{E:@thm_peach} before `run catppuccin.tmux` expands wrong on cold start.
# If you change @catppuccin_flavor, update these to match that palette.
set -g @catppuccin_cpu_color "#fab387"
set -g @catppuccin_ram_color "#cba6f7"

# status_module.conf only assigns @catppuccin_status_*_icon_bg when empty; without
# unset, a reload keeps the old yellow icon_bg and ignores new @catppuccin_*_color.
set -ug @catppuccin_status_cpu_icon_bg
set -ug @catppuccin_status_ram_icon_bg

# Load catppuccin manually (recommended by upstream to avoid TPM conflicts).
run "$HOME/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux"

# ─── Status left ──────────────────────────────────────────────────────────────
# Shows: session name
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-left-length 60

# ─── Status right ──────────────────────────────────────────────────────────────
set -g status-right-length 150
set -g status-right "#{E:@catppuccin_status_gitmux}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_load}"

# ─── Status bar background ────────────────────────────────────────────────────
# "default" tells tmux not to paint any background — the terminal's own
# background colour shows through instead.
# Must come AFTER the @catppuccin_* options so it overrides the theme's surface.
# To restore catppuccin's solid background, comment all three lines out.
# set -g status-style                "bg=default"
# set -g window-status-style         "bg=default"
# set -g window-status-current-style "bg=default"

# ─── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style          "fg=#{@thm_surface0}"
set -g pane-active-border-style   "fg=#{@thm_lavender}"

# ─── TPM bootstrap ────────────────────────────────────────────────────────────
# If ~/.tmux/plugins/tpm does not exist, clone it and immediately install every
# @plugin listed in this file — no manual step required on a fresh machine.
# On all subsequent starts TPM is already present and this if-branch is skipped.
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
        ~/.tmux/plugins/tpm/bin/install_plugins'"

# Auto-install any *newly added* @plugin lines whenever a session is created.
# Zero cost on normal launches (install_plugins is a no-op when nothing is missing).
set-hook -g session-created "run-shell '~/.tmux/plugins/tpm/bin/install_plugins'"

# Load TPM — almost last: status modules must run after the theme loads.
# Manual shortcuts (still available):
#   prefix + I       install missing plugins
#   prefix + U       upgrade all plugins
#   prefix + Alt-u   remove plugins no longer in the list
run '~/.tmux/plugins/tpm/tpm'

# tmux-cpu rewrites status-left/status-right to swap in #(...) for #{cpu_percentage},
# #{ram_*}, etc. Run it again after TPM so catppuccin #{E:...} segments are patched
# on cold start (see catppuccin README: explicit cpu.tmux after status-right).
# End with `exit 0`: cpu.tmux can return 1 on prefix+r when placeholders are already
# interpolated — harmless; tmux would otherwise show "returned 1" in the status line.
run-shell 'f="$HOME/.tmux/plugins/tmux-cpu/cpu.tmux"; [ ! -r "$f" ] && f="$HOME/.config/tmux/plugins/tmux-cpu/cpu.tmux"; [ -r "$f" ] && bash "$f"; exit 0'
if-shell -F '#{client_name}' 'refresh-client -S'

# # Space below the status bar: extra row between the main status line and panes
# # (tmux 3.4+). Only status-format[1] is customized; line 0 keeps the default
# # layout built from status-left / window list / status-right (catppuccin + pills).
# set -g status 2
# set -g 'status-format[1]' '#[bg=default] '

