# vim:set ft=tmux:
%hidden MODULE_NAME="memory"
set -gq @catppuccin_memory_icon "󰾆 "
set -gq @catppuccin_memory_color "#FCE38A"
set -gq @catppuccin_memory_text " #($HOME/.config/tmux/status_pills/scripts/memory_used_gb.sh)"
set -gqF "@catppuccin_status_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"
set -gqF "@catppuccin_status_${MODULE_NAME}_text_bg" "#{E:@catppuccin_status_module_text_bg}"
set -gqF @catppuccin_status_middle_separator "#[fg=#{@catppuccin_status_${MODULE_NAME}_icon_bg},bg=#{@catppuccin_status_${MODULE_NAME}_text_bg}]"
source-file -F "#{TMUX_PLUGIN_MANAGER_PATH}tmux/utils/status_module.conf"
